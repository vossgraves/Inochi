services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: inochi
      POSTGRES_USER: inochi
      POSTGRES_PASSWORD: inochi
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - inochi-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inochi"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  inochi-postgres:
